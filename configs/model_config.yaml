models:
  logistic_regression:
    enabled: true
    params:
      C: 1.0
      max_iter: 1000
      solver: "lbfgs"
      class_weight: "balanced"
      random_state: 42

  random_forest:
    enabled: true
    params:
      n_estimators: 300
      max_depth: 15
      min_samples_split: 10
      min_samples_leaf: 4
      max_features: "sqrt"
      class_weight: "balanced"
      n_jobs: -1
      random_state: 42

  xgboost:
    enabled: true
    params:
      n_estimators: 500
      max_depth: 8
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      min_child_weight: 5
      gamma: 0.1
      reg_alpha: 0.1
      reg_lambda: 1.0
      scale_pos_weight: 3   # handles class imbalance
      eval_metric: "auc"
      use_label_encoder: false
      random_state: 42
      n_jobs: -1

  lightgbm:
    enabled: true
    params:
      n_estimators: 500
      max_depth: 8
      learning_rate: 0.05
      num_leaves: 63
      subsample: 0.8
      colsample_bytree: 0.8
      min_child_samples: 20
      reg_alpha: 0.1
      reg_lambda: 1.0
      class_weight: "balanced"
      random_state: 42
      n_jobs: -1
      verbose: -1

  gradient_boosting:
    enabled: false   # slow on large data; enable if needed
    params:
      n_estimators: 200
      max_depth: 5
      learning_rate: 0.1
      subsample: 0.8
      random_state: 42

tuning:
  enabled: false          # set true to run RandomizedSearchCV
  n_iter: 20
  cv: 3
  scoring: "roc_auc"
  n_jobs: -1

evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "roc_auc"
    - "average_precision"
  threshold: 0.5
  save_plots: true
